apiVersion: platform.steadystate.dev/v1alpha1
kind: Application
metadata:
  name: demo
  namespace: team-payments
spec:
  owner: platform-team
  image:
    repository: ghcr.io/saadabdullaah/steadystate-demo-app
    tag: v0.1.0
  runtime:
    port: 8080
    replicas:
      min: 1
      max: 3
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  deployment:
    strategy: rolling
    automaticRollback: true
  reliability:
    availabilityTarget: "99.9%"
    maximumP95Latency: 250ms
    maximumErrorRate: "1%"
  observability:
    metrics: false
    logs: false
    traces: false
  security:
    requireSignedImage: false
    runAsNonRoot: true
    networkIsolation: false
