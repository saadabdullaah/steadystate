---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: teams.platform.steadystate.dev
spec:
  group: platform.steadystate.dev
  names:
    kind: Team
    listKind: TeamList
    plural: teams
    shortNames:
    - team
    singular: team
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.namespace
      name: Namespace
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              allowedRepositories:
                items:
                  maxLength: 512
                  minLength: 1
                  pattern: ^[^@[:space:]]+$
                  type: string
                maxItems: 32
                minItems: 1
                type: array
                x-kubernetes-list-type: set
              owners:
                items:
                  maxLength: 253
                  minLength: 1
                  pattern: ^[^[:space:]]+$
                  type: string
                maxItems: 32
                minItems: 1
                type: array
                x-kubernetes-list-type: set
              quota:
                properties:
                  cpu:
                    anyOf:
                    - type: integer
                    - type: string
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                  memory:
                    anyOf:
                    - type: integer
                    - type: string
                    pattern: ^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$
                    x-kubernetes-int-or-string: true
                required:
                - cpu
                - memory
                type: object
                x-kubernetes-validations:
                - message: CPU quota must be at least 500m
                  rule: quantity(self.cpu).compareTo(quantity('500m')) >= 0
                - message: memory quota must be at least 512Mi
                  rule: quantity(self.memory).compareTo(quantity('512Mi')) >= 0
            required:
            - allowedRepositories
            - owners
            - quota
            type: object
          status:
            properties:
              conditions:
                items:
                  properties:
                    lastTransitionTime:
                      format: date-time
                      type: string
                    message:
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              namespace:
                type: string
              observedGeneration:
                format: int64
                type: integer
            type: object
        required:
        - spec
        type: object
        x-kubernetes-validations:
        - message: Team names must contain at most 58 characters
          rule: size(self.metadata.name) <= 58
        - message: Team names must be DNS labels
          rule: self.metadata.name.matches('^[a-z0-9]([-a-z0-9]*[a-z0-9])?$')
    served: true
    storage: true
    subresources:
      status: {}
