# This rule is not used by the project steadystate itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants explicit administrative permissions over platform.steadystate.dev.
# This role is intended for users authorized to modify roles and bindings within the cluster,
# enabling them to delegate specific permissions to other users or groups as needed.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: steadystate
    app.kubernetes.io/managed-by: kustomize
  name: application-admin-role
rules:
- apiGroups:
  - platform.steadystate.dev
  resources:
  - applications
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - platform.steadystate.dev
  resources:
  - applications/status
  verbs:
  - get
