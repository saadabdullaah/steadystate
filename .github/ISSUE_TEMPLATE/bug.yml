name: Bug report
description: Report a reproducible SteadyState problem.
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not include credentials, kubeconfigs, or private planning material.
  - type: textarea
    id: behavior
    attributes:
      label: Observed behavior
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the profile and exact commands.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Windows 11, Docker Desktop version, profile
    validations:
      required: true
