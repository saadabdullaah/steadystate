name: Phase 4 acceptance

on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: phase4-acceptance-${{ github.ref }}
  cancel-in-progress: false

jobs:
  acceptance:
    name: gitops-canary-and-rollback
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install checksum-verified platform tools
        timeout-minutes: 8
        shell: pwsh
        run: |
          ./scripts/install-tools.ps1 -BaseOnly
          ./scripts/dev.ps1 check-versions
          ./scripts/dev.ps1 verify-progressive-delivery

      - name: Load pinned recording versions
        shell: pwsh
        run: |
          $required = @('VHS_VERSION','TTYD_VERSION','VHS_LINUX_X86_64_SHA256','TTYD_LINUX_X86_64_SHA256')
          $entries = @{}
          Get-Content -LiteralPath scripts/versions.env | ForEach-Object {
            if ($_ -match '^([^#=]+)=(.+)$') { $entries[$Matches[1]] = $Matches[2] }
          }
          foreach ($name in $required) {
            if (-not $entries[$name]) { throw "$name is missing from scripts/versions.env." }
            "$name=$($entries[$name])" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Install pinned recording tools
        timeout-minutes: 6
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes ffmpeg
          fi
          install_dir="$RUNNER_TEMP/steadystate-recording/bin"
          mkdir -p "$install_dir"
          archive="$RUNNER_TEMP/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz"
          curl --fail --location --retry 3 --output "$archive" \
            "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz"
          echo "${VHS_LINUX_X86_64_SHA256}  ${archive}" | sha256sum --check --strict
          tar --extract --gzip --strip-components=1 --file "$archive" --directory "$install_dir"
          curl --fail --location --retry 3 --output "$install_dir/ttyd" \
            "https://github.com/tsl0922/ttyd/releases/download/${TTYD_VERSION}/ttyd.x86_64"
          echo "${TTYD_LINUX_X86_64_SHA256}  ${install_dir}/ttyd" | sha256sum --check --strict
          chmod 0755 "$install_dir/vhs" "$install_dir/ttyd"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Bootstrap standard profile
        timeout-minutes: 15
        shell: pwsh
        run: ./scripts/dev.ps1 bootstrap -Profile standard

      - name: Build and load local platform images
        timeout-minutes: 10
        shell: pwsh
        run: |
          ./scripts/dev.ps1 build-images
          ./scripts/dev.ps1 load-images

      - name: Prepare ephemeral acceptance branch
        shell: pwsh
        run: |
          "PHASE4_ACCEPTANCE_BRANCH=acceptance/phase4-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create repository-scoped delivery token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ vars.STEADYSTATE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.STEADYSTATE_BOT_PRIVATE_KEY }}
          permission-contents: write

      - name: Configure Git credentials
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh auth setup-git

      - name: Prepare rolling baseline outside recordings
        id: prepare
        timeout-minutes: 15
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PHASE4_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: ./scripts/phase4-acceptance.ps1 -Stage Prepare -Profile standard

      - name: Record automatic good-canary promotion
        id: promotion
        timeout-minutes: 22
        shell: bash
        env:
          CI: ""
          COLORTERM: truecolor
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PHASE4_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: timeout --signal=TERM --kill-after=30s 21m vhs docs/demonstrations/phase4-canary-promotion.tape

      - name: Verify promotion recording result
        id: promotion-verification
        timeout-minutes: 2
        shell: pwsh
        run: |
          $state = Get-Content -Raw -LiteralPath .artifacts/phase4/acceptance/state.json | ConvertFrom-Json
          $passed = @($state.checks | Where-Object {$_.name -eq 'good-canary-promoted-automatically' -and $_.status -eq 'passed'})
          if ($state.promotionResult -ne 'passed' -or $passed.Count -ne 1) {
            throw "The recorded promotion stage did not pass completely: $($state.failure)"
          }

      - name: Record automatic rollback and Git recovery
        id: rollback
        timeout-minutes: 30
        shell: bash
        env:
          CI: ""
          COLORTERM: truecolor
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PHASE4_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
        run: timeout --signal=TERM --kill-after=30s 29m vhs docs/demonstrations/phase4-automatic-rollback.tape

      - name: Verify rollback recording result
        id: rollback-verification
        timeout-minutes: 5
        shell: pwsh
        run: |
          $state = Get-Content -Raw -LiteralPath .artifacts/phase4/acceptance/state.json | ConvertFrom-Json
          if ($state.rollbackResult -ne 'passed' -or $state.failure) {
            throw "The recorded rollback stage did not pass completely: $($state.failure)"
          }
          ./scripts/phase4-acceptance.ps1 -Stage Finalize -Profile standard -EvidencePath .artifacts/phase4/acceptance/evidence.json
          $evidence = Get-Content -Raw -LiteralPath .artifacts/phase4/acceptance/evidence.json | ConvertFrom-Json
          if ($evidence.schemaVersion -ne 1 -or $evidence.result -ne 'passed' -or $evidence.failure) {
            throw 'The recorded rollback and recovery stage did not pass.'
          }

      - name: Capture acceptance diagnostics
        if: always()
        continue-on-error: true
        timeout-minutes: 5
        shell: pwsh
        run: ./scripts/dev.ps1 diagnostics

      - name: Capture failed-run evidence
        if: always() && steps.prepare.outcome != 'skipped' && (steps.promotion-verification.outcome != 'success' || steps.rollback-verification.outcome != 'success')
        continue-on-error: true
        timeout-minutes: 5
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PHASE4_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          PHASE4_FAILURE_MESSAGE: >-
            prepare=${{ steps.prepare.outcome }}, promotion=${{ steps.promotion.outcome }}, rollback=${{ steps.rollback.outcome }}
        run: ./scripts/phase4-acceptance.ps1 -Stage CaptureFailure -Profile standard

      - name: Verify acceptance evidence
        if: steps.rollback-verification.outcome == 'success'
        timeout-minutes: 3
        shell: pwsh
        run: |
          foreach ($path in @(
            '.artifacts/phase4/acceptance/phase4-canary-promotion.gif',
            '.artifacts/phase4/acceptance/phase4-automatic-rollback.gif'
          )) {
            $file = Get-Item -LiteralPath $path
            if ($file.Length -le 0) { throw "$path is empty." }
          }
          $evidence = Get-Content -Raw -LiteralPath .artifacts/phase4/acceptance/evidence.json | ConvertFrom-Json
          if ($evidence.schemaVersion -ne 1 -or $evidence.result -ne 'passed' -or $evidence.failure) {
            throw 'The Phase 4 acceptance evidence is invalid or failed.'
          }
          if ($evidence.sourceSHA -ne $env:GITHUB_SHA -or $evidence.ephemeralBranch -ne $env:PHASE4_ACCEPTANCE_BRANCH -or $evidence.profile -ne 'standard') {
            throw 'Evidence does not describe this workflow revision, branch, and profile.'
          }
          foreach ($name in @('baseline','rollingToCanary','promotion','rejection','recovery','canaryToRolling')) {
            if ([string]$evidence.commits.$name -notmatch '^([0-9a-f]{40}|[0-9a-f]{64})$') { throw "Invalid acceptance commit: $name" }
          }
          if (-not $evidence.registry.good.anonymousPull -or -not $evidence.registry.bad.anonymousPull -or
              $evidence.registry.good.runtimeDigest -notmatch '^sha256:[0-9a-f]{64}$' -or
              $evidence.registry.bad.runtimeDigest -notmatch '^sha256:[0-9a-f]{64}$' -or
              $evidence.registry.good.runtimeDigest -eq $evidence.registry.bad.runtimeDigest) {
            throw 'Anonymous good/bad registry evidence is invalid.'
          }
          $required = @(
            'baseline-rolling-reachable',
            'rolling-to-canary-zero-downtime',
            'good-canary-promoted-automatically',
            'runtime-digest-and-revision-match-promotion',
            'promotion-path-no-routing-outage',
            'candidate-alert-visible-in-alertmanager',
            'bad-canary-aborted-and-preserved-active-tuple',
            'three-stable-only-windows-after-abort',
            'recovery-commit-restored-healthy',
            'canary-to-rolling-git-detected',
            'canary-to-rolling-zero-downtime',
            'argo-and-application-health-agree'
          )
          $passed = @($evidence.checks | Where-Object status -eq 'passed' | ForEach-Object name)
          foreach ($name in $required) { if ($name -notin $passed) { throw "Missing passed acceptance check: $name" } }
          if (@($evidence.measurements).Count -ne 5) { throw 'Expected four promotion measurements and one rollback measurement.' }
          foreach ($measurement in @($evidence.measurements)) {
            if ($measurement.samples -lt 500 -or [Math]::Abs([double]$measurement.observedCanaryPercent - [double]$measurement.requestedCanaryPercent) -gt 8) {
              throw 'A traffic measurement violates its sample or tolerance contract.'
            }
            if ([int]$measurement.requestedCanaryPercent -eq 100 -and [double]$measurement.observedCanaryPercent -lt 99) {
              throw 'The 100% canary window did not measure at least 99% candidate traffic.'
            }
          }
          if (@($evidence.stableWindows).Count -ne 3 -or @($evidence.stableWindows | Where-Object durationSeconds -lt 30).Count -gt 0) {
            throw 'The three stable-only post-abort windows are invalid.'
          }
          if ([double]$evidence.monitoringWorkingSetBytes -lt 0 -or [double]$evidence.monitoringWorkingSetBytes -gt 1.2GB) {
            throw 'Monitoring exceeded the 1.2 GiB acceptance budget.'
          }

      - name: Verify artifact completeness
        if: always() && steps.prepare.outcome != 'skipped'
        timeout-minutes: 3
        shell: pwsh
        run: |
          $required = @(
            'docs/demonstrations/phase4-canary-promotion.tape',
            'docs/demonstrations/phase4-automatic-rollback.tape',
            '.artifacts/phase4/acceptance/state.json',
            '.artifacts/phase4/acceptance/registry.json'
          )
          if ('${{ steps.rollback-verification.outcome }}' -eq 'success') {
            $required += @(
              '.artifacts/phase4/acceptance/phase4-canary-promotion.gif',
              '.artifacts/phase4/acceptance/phase4-automatic-rollback.gif',
              '.artifacts/phase4/acceptance/evidence.json',
              '.artifacts/phase4/acceptance/metrics/analysis-runs.json',
              '.artifacts/phase4/acceptance/metrics/alertmanager.json',
              '.artifacts/phase4/acceptance/metrics/prometheus-working-set.json',
              '.artifacts/phase4/acceptance/promotion-k6-summary.json',
              '.artifacts/phase4/acceptance/rollback-k6-summary.json',
              '.artifacts/phase4/acceptance/final-migration-k6-summary.json',
              '.artifacts/phase4/acceptance/logs/operator.log',
              '.artifacts/phase4/acceptance/logs/rollouts.log',
              '.artifacts/phase4/acceptance/logs/prometheus.log'
            )
          }
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf) -or (Get-Item -LiteralPath $path).Length -le 0) { throw "Missing or empty artifact file: $path" }
          }
          $diagnostics = @(Get-ChildItem -LiteralPath .artifacts/diagnostics -Recurse -File -ErrorAction SilentlyContinue)
          if ($diagnostics.Count -eq 0) { throw 'Cluster diagnostics are missing.' }

      - name: Upload Phase 4 acceptance artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: phase4-acceptance-${{ github.sha }}
          path: |
            docs/demonstrations/phase4-canary-promotion.tape
            docs/demonstrations/phase4-automatic-rollback.tape
            .artifacts/phase4/acceptance/
            .artifacts/diagnostics/
          retention-days: 30
          if-no-files-found: error
          include-hidden-files: true

      - name: Delete ephemeral acceptance branch
        if: always() && steps.prepare.outcome != 'skipped'
        continue-on-error: true
        timeout-minutes: 2
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git switch --detach $env:GITHUB_SHA
          git push origin --delete $env:PHASE4_ACCEPTANCE_BRANCH

      - name: Undeploy GitOps
        if: always()
        continue-on-error: true
        timeout-minutes: 5
        shell: pwsh
        run: ./scripts/dev.ps1 undeploy-gitops

      - name: Destroy cluster
        if: always()
        timeout-minutes: 5
        shell: pwsh
        run: ./scripts/dev.ps1 destroy
