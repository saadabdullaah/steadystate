name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Install pinned project tools
        shell: pwsh
        run: ./scripts/install-tools.ps1
      - name: Privacy and text checks
        shell: pwsh
        run: |
          ./scripts/check-private-files.ps1
          ./scripts/check-text.ps1
      - name: Go checks
        shell: pwsh
        run: |
          ./scripts/dev.ps1 check-versions
          ./scripts/dev.ps1 lint
          ./scripts/dev.ps1 test
      - name: Workflow, YAML, Markdown, and shell lint
        shell: bash
        run: |
          source scripts/versions.env
          go install github.com/rhysd/actionlint/cmd/actionlint@v${ACTIONLINT_VERSION}
          "$(go env GOPATH)/bin/actionlint"
          python -m pip install --disable-pip-version-check "yamllint==${YAMLLINT_VERSION}"
          yamllint .
          npx --yes "markdownlint-cli2@${MARKDOWNLINT_CLI2_VERSION}" "**/*.md" "#m-plan.md"
          shellcheck scripts/*.sh

  windows:
    name: windows
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install and verify Windows toolchain
        shell: pwsh
        run: |
          ./scripts/install-tools.ps1
          ./scripts/dev.ps1 check-versions
          ./scripts/dev.ps1 test

  security:
    name: security
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - name: Scan Git history for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: 8.28.0
      - name: Trivy repository and IaC scan
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # pinned snapshot
        with:
          directory: .
          framework: kubernetes,github_actions
          quiet: true
          soft_fail: false

  kind-smoke:
    name: kind-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Install pinned project tools
        shell: pwsh
        run: ./scripts/install-tools.ps1
      - name: Bootstrap minimal cluster
        shell: pwsh
        run: ./scripts/dev.ps1 bootstrap -Profile minimal
      - name: Upload diagnostics after failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kind-diagnostics
          path: .artifacts/diagnostics/
          retention-days: 7
      - name: Destroy cluster
        if: always()
        shell: pwsh
        run: ./scripts/dev.ps1 destroy
