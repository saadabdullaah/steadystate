name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: quality
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Install pinned project tools
        shell: pwsh
        run: ./scripts/install-tools.ps1
      - name: Privacy and text checks
        shell: pwsh
        run: |
          ./scripts/check-private-files.ps1
          ./scripts/check-text.ps1
      - name: Require demo VERSION bump
        if: github.event_name == 'pull_request'
        shell: pwsh
        env:
          BASE_REVISION: ${{ github.event.pull_request.base.sha }}
        run: ./scripts/check-demo-version.ps1 -BaseRevision $env:BASE_REVISION
      - name: Go checks
        shell: pwsh
        run: |
          ./scripts/dev.ps1 check-versions
          ./scripts/dev.ps1 verify-generated
          ./scripts/dev.ps1 verify-gitops
          ./scripts/dev.ps1 lint
          ./scripts/dev.ps1 test
      - name: Demo race tests
        shell: pwsh
        run: go test -race ./apps/demo-app/...
      - name: Workflow, YAML, Markdown, and shell lint
        shell: bash
        run: |
          source scripts/versions.env
          go install github.com/rhysd/actionlint/cmd/actionlint@v${ACTIONLINT_VERSION}
          "$(go env GOPATH)/bin/actionlint"
          python -m pip install --disable-pip-version-check "yamllint==${YAMLLINT_VERSION}"
          yamllint .
          npx --yes "markdownlint-cli2@${MARKDOWNLINT_CLI2_VERSION}" "**/*.md" "#m-plan.md"
          shellcheck scripts/*.sh

  windows:
    name: windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install and verify Windows toolchain
        shell: pwsh
        run: |
          ./scripts/install-tools.ps1
          ./scripts/dev.ps1 check-versions
          ./scripts/dev.ps1 generate
          ./scripts/dev.ps1 manifests
          git diff --exit-code -- api config/crd config/rbac
          ./scripts/dev.ps1 verify-gitops
          ./scripts/dev.ps1 test

  envtest:
    name: envtest
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned Linux tools
        shell: bash
        run: ./scripts/install-tools.sh --skip-lint
      - name: Run Kubernetes 1.35 envtest
        shell: pwsh
        run: ./scripts/dev.ps1 test-envtest

  security:
    name: security
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Prepare security report directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path .artifacts/security | Out-Null
      - name: Scan Git history for secrets
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_VERSION: 8.28.0
      - name: Trivy repository and IaC machine-readable report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-dirs: tests/security
          trivyignores: .trivyignore.yaml
          format: json
          output: .artifacts/security/trivy.json
          exit-code: "0"
      - name: Gosec machine-readable report
        continue-on-error: true
        uses: securego/gosec@9e75c0576c9878035d4221392108d458abe10fc3
        with:
          args: "-no-fail -fmt sarif -out .artifacts/security/gosec.sarif ./..."
      - name: Go vulnerability machine-readable report
        uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f
        with:
          repo-checkout: false
          go-version-input: "1.25.12"
          go-package: ./...
          output-format: sarif
          output-file: .artifacts/security/govulncheck.sarif
      - name: Gosec blocking gate
        uses: securego/gosec@9e75c0576c9878035d4221392108d458abe10fc3
        with:
          args: "-severity high -confidence medium ./..."
      - name: Go vulnerability gate
        uses: golang/govulncheck-action@032d45514ae346b1db93c04b0c90b841c370344f
        with:
          repo-checkout: false
          go-version-input: "1.25.12"
          go-package: ./...
      - name: Trivy repository and IaC blocking gate
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          skip-dirs: tests/security
          trivyignores: .trivyignore.yaml
          exit-code: "1"
      - name: Install security policy CLI
        shell: pwsh
        run: ./scripts/install-tools.ps1 -BaseOnly -IncludeSecurity
      - name: Test enforced Kyverno policies
        shell: pwsh
        run: ./scripts/security-static.ps1
      - name: Checkov IaC scan
        uses: bridgecrewio/checkov-action@7b972723c44fb3d256283fac96fae5d7c1894bb7 # pinned snapshot
        with:
          directory: .
          framework: kubernetes,github_actions
          skip_path: tests/security
          quiet: true
          soft_fail: false
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: security-reports-${{ github.sha }}
          path: .artifacts/security/
          retention-days: 30
          if-no-files-found: warn
          include-hidden-files: true

  kind-smoke:
    name: kind-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned project tools
        shell: pwsh
        run: ./scripts/install-tools.ps1 -BaseOnly
      - name: Bootstrap minimal cluster
        shell: pwsh
        run: ./scripts/dev.ps1 bootstrap -Profile minimal
      - name: Upload diagnostics after failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: kind-diagnostics
          path: .artifacts/diagnostics/
          retention-days: 7
          include-hidden-files: true
      - name: Destroy cluster
        if: always()
        shell: pwsh
        run: ./scripts/dev.ps1 destroy
