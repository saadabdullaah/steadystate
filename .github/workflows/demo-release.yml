name: Demo release

on:
  push:
    branches: [main]
    paths:
      - apps/demo-app/main.go
      - apps/demo-app/Dockerfile
      - apps/demo-app/VERSION
      - go.mod
      - go.sum
  workflow_dispatch: # Recovery only; no user-controlled build inputs.

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: demo-release
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/saadabdullaah/steadystate-demo-app

jobs:
  impact:
    name: detect-demo-runtime-impact
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.impact.outputs.release }}
    steps:
      - name: Checkout source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Detect declared demo release
        id: impact
        shell: pwsh
        env:
          BEFORE_SHA: ${{ github.event.before }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if ($env:EVENT_NAME -eq 'workflow_dispatch') {
            'release=true' >> $env:GITHUB_OUTPUT
            exit 0
          }
          $changed = @(git diff --name-only $env:BEFORE_SHA $env:GITHUB_SHA)
          if ($LASTEXITCODE -ne 0) { throw 'Could not inspect the pushed demo release range.' }
          $release = if ('apps/demo-app/VERSION' -in $changed) { 'true' } else { 'false' }
          "release=$release" >> $env:GITHUB_OUTPUT

  release:
    needs: impact
    if: needs.impact.outputs.release == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Validate release version
        id: metadata
        shell: pwsh
        run: |
          $version = (Get-Content -Raw -LiteralPath apps/demo-app/VERSION).Trim()
          if ($version -cnotmatch '^v(?:0|[1-9][0-9]*)\.(?:0|[1-9][0-9]*)\.(?:0|[1-9][0-9]*)$') {
            throw 'apps/demo-app/VERSION must contain strict vMAJOR.MINOR.PATCH syntax.'
          }
          "version=$version" >> $env:GITHUB_OUTPUT
          "sha_tag=sha-$env:GITHUB_SHA" >> $env:GITHUB_OUTPUT
          "bad_version=$version-bad" >> $env:GITHUB_OUTPUT
          "bad_sha_tag=sha-$env:GITHUB_SHA-bad" >> $env:GITHUB_OUTPUT

      - name: Test demo application
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .artifacts/security | Out-Null
          $goFiles = @(Get-ChildItem -LiteralPath apps/demo-app -Filter '*.go' -File | ForEach-Object FullName)
          $unformatted = @(gofmt -l @goFiles)
          if ($LASTEXITCODE -ne 0) { throw 'gofmt failed.' }
          if ($unformatted.Count -gt 0) { throw "Unformatted demo files: $($unformatted -join ', ')" }
          go vet ./apps/demo-app/...
          if ($LASTEXITCODE -ne 0) { throw 'go vet failed for the demo application.' }
          go test -race ./apps/demo-app/...
          if ($LASTEXITCODE -ne 0) { throw 'Demo application tests failed.' }

      - name: Scan source before publication
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: CRITICAL
          ignore-unfixed: true
          skip-dirs: tests/security
          format: json
          output: .artifacts/security/demo-source-trivy.json
          exit-code: "1"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Log in to GHCR
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check immutable registry tags
        id: preflight
        shell: pwsh
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
          SHA_TAG: ${{ steps.metadata.outputs.sha_tag }}
          BAD_VERSION: ${{ steps.metadata.outputs.bad_version }}
          BAD_SHA_TAG: ${{ steps.metadata.outputs.bad_sha_tag }}
        run: |
          function Get-RegistryDigest {
              param([Parameter(Mandatory)][string]$Reference)
              $previousPreference = $ErrorActionPreference
              $ErrorActionPreference = 'Continue'
              $output = @(& docker buildx imagetools inspect $Reference 2>&1)
              $exitCode = $LASTEXITCODE
              $ErrorActionPreference = $previousPreference
              if ($exitCode -ne 0) {
                  $message = $output -join [Environment]::NewLine
                  if ($message -match '(?i)manifest unknown|not found') { return $null }
                  throw "Registry inspection failed for ${Reference}: $message"
              }
              $digestLines = @($output | Where-Object { $_ -match '^Digest:' })
              if ($digestLines.Count -ne 1) { throw "Expected one registry digest for $Reference." }
              $match = [regex]::Match([string]$digestLines[0], '^Digest:\s+(sha256:[0-9a-f]{64})\s*$')
              if (-not $match.Success) { throw "Malformed registry digest for $Reference." }
              return $match.Groups[1].Value
          }

          $references = [ordered]@{
              goodVersion = "$env:IMAGE`:$env:VERSION"
              goodSHA = "$env:IMAGE`:$env:SHA_TAG"
              badVersion = "$env:IMAGE`:$env:BAD_VERSION"
              badSHA = "$env:IMAGE`:$env:BAD_SHA_TAG"
          }
          $digests = @{}
          foreach ($entry in $references.GetEnumerator()) {
              $digests[$entry.Key] = Get-RegistryDigest -Reference $entry.Value
          }
          $present = @($digests.Values | Where-Object { $_ }).Count
          if ($present -eq 0) {
              'publish=true' >> $env:GITHUB_OUTPUT
              exit 0
          }
          if ($present -ne $references.Count) {
              throw 'Immutable tag reuse is partial; all good and bad semver/SHA tags must exist or all must be absent.'
          }
          if ($digests.goodVersion -ne $digests.goodSHA) {
              throw 'Immutable good semver and SHA tags resolve to different digests.'
          }
          if ($digests.badVersion -ne $digests.badSHA) {
              throw 'Immutable bad semver and SHA tags resolve to different digests.'
          }
          if ($digests.goodVersion -eq $digests.badVersion) {
              throw 'Good and bad image variants must resolve to distinct digests.'
          }
          'publish=false' >> $env:GITHUB_OUTPUT
          "good_digest=$($digests.goodVersion)" >> $env:GITHUB_OUTPUT
          "bad_digest=$($digests.badVersion)" >> $env:GITHUB_OUTPUT

      - name: Build and publish immutable good demo image
        if: steps.preflight.outputs.publish == 'true'
        id: build_good
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: apps/demo-app/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          build-args: INJECT_ERROR_RATE=0
          tags: |
            ${{ env.IMAGE }}:${{ steps.metadata.outputs.version }}
            ${{ env.IMAGE }}:${{ steps.metadata.outputs.sha_tag }}

      - name: Build and publish immutable bad demo image
        if: steps.preflight.outputs.publish == 'true'
        id: build_bad
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: apps/demo-app/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          build-args: INJECT_ERROR_RATE=0.10
          tags: |
            ${{ env.IMAGE }}:${{ steps.metadata.outputs.bad_version }}
            ${{ env.IMAGE }}:${{ steps.metadata.outputs.bad_sha_tag }}

      - name: Verify published digest
        id: registry
        shell: pwsh
        env:
          VERSION: ${{ steps.metadata.outputs.version }}
          SHA_TAG: ${{ steps.metadata.outputs.sha_tag }}
          BAD_VERSION: ${{ steps.metadata.outputs.bad_version }}
          BAD_SHA_TAG: ${{ steps.metadata.outputs.bad_sha_tag }}
          PUBLISH: ${{ steps.preflight.outputs.publish }}
          BUILT_GOOD_DIGEST: ${{ steps.build_good.outputs.digest }}
          BUILT_BAD_DIGEST: ${{ steps.build_bad.outputs.digest }}
          REUSED_GOOD_DIGEST: ${{ steps.preflight.outputs.good_digest }}
          REUSED_BAD_DIGEST: ${{ steps.preflight.outputs.bad_digest }}
        run: |
          function Get-RegistryDigest {
              param([Parameter(Mandatory)][string]$Reference)
              $output = @(& docker buildx imagetools inspect $Reference)
              if ($LASTEXITCODE -ne 0) { throw "Registry inspection failed for $Reference." }
              $digestLines = @($output | Where-Object { $_ -match '^Digest:' })
              if ($digestLines.Count -ne 1) { throw "Expected one registry digest for $Reference." }
              $match = [regex]::Match([string]$digestLines[0], '^Digest:\s+(sha256:[0-9a-f]{64})\s*$')
              if (-not $match.Success) { throw "Malformed registry digest for $Reference." }
              return $match.Groups[1].Value
          }

          $goodDigest = if ($env:PUBLISH -eq 'true') { $env:BUILT_GOOD_DIGEST } else { $env:REUSED_GOOD_DIGEST }
          $badDigest = if ($env:PUBLISH -eq 'true') { $env:BUILT_BAD_DIGEST } else { $env:REUSED_BAD_DIGEST }
          foreach ($digest in @($goodDigest, $badDigest)) {
              if ($digest -cnotmatch '^sha256:[0-9a-f]{64}$') { throw 'A recorded image digest is invalid.' }
          }
          if ($goodDigest -eq $badDigest) { throw 'Good and bad image variants must have distinct digests.' }
          $expectedReferences = [ordered]@{
              "$env:IMAGE`:$env:VERSION" = $goodDigest
              "$env:IMAGE`:$env:SHA_TAG" = $goodDigest
              "$env:IMAGE`:$env:BAD_VERSION" = $badDigest
              "$env:IMAGE`:$env:BAD_SHA_TAG" = $badDigest
          }
          foreach ($entry in $expectedReferences.GetEnumerator()) {
              if ((Get-RegistryDigest -Reference $entry.Key) -ne $entry.Value) {
                  throw "$($entry.Key) does not resolve to the recorded digest."
              }
          }
          "digest=$goodDigest" >> $env:GITHUB_OUTPUT
          "bad_digest=$badDigest" >> $env:GITHUB_OUTPUT

      - name: Scan immutable good image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.registry.outputs.digest }}
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          format: json
          output: .artifacts/security/demo-good-trivy.json
          exit-code: "1"

      - name: Scan immutable bad image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}@${{ steps.registry.outputs.bad_digest }}
          scanners: vuln
          severity: CRITICAL
          ignore-unfixed: true
          format: json
          output: .artifacts/security/demo-bad-trivy.json
          exit-code: "1"

      - name: Generate good-image SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.IMAGE }}@${{ steps.registry.outputs.digest }}
          format: spdx-json
          output-file: .artifacts/security/demo-good.spdx.json
          artifact-name: demo-good-${{ steps.metadata.outputs.version }}.spdx.json
          syft-version: v1.48.0
          upload-artifact: false
          upload-release-assets: false

      - name: Generate bad-image SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.IMAGE }}@${{ steps.registry.outputs.bad_digest }}
          format: spdx-json
          output-file: .artifacts/security/demo-bad.spdx.json
          artifact-name: demo-bad-${{ steps.metadata.outputs.version }}.spdx.json
          syft-version: v1.48.0
          upload-artifact: false
          upload-release-assets: false

      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: v3.1.2

      - name: Sign, attest, and verify immutable images
        shell: pwsh
        env:
          GOOD_DIGEST: ${{ steps.registry.outputs.digest }}
          BAD_DIGEST: ${{ steps.registry.outputs.bad_digest }}
        run: |
          $identity = 'https://github.com/saadabdullaah/steadystate/.github/workflows/demo-release.yml@refs/heads/main'
          $issuer = 'https://token.actions.githubusercontent.com'
          $subjects = @(
            @{ Reference = "$env:IMAGE@$env:GOOD_DIGEST"; SBOM = '.artifacts/security/demo-good.spdx.json' },
            @{ Reference = "$env:IMAGE@$env:BAD_DIGEST"; SBOM = '.artifacts/security/demo-bad.spdx.json' }
          )
          foreach ($subject in $subjects) {
            cosign sign --yes $subject.Reference
            if ($LASTEXITCODE -ne 0) { throw "Cosign signing failed for $($subject.Reference)." }
            cosign attest --yes --type spdxjson --predicate $subject.SBOM $subject.Reference
            if ($LASTEXITCODE -ne 0) { throw "Cosign SBOM attestation failed for $($subject.Reference)." }
            cosign verify --certificate-identity $identity --certificate-oidc-issuer $issuer $subject.Reference | Out-File -Encoding utf8 "$($subject.SBOM).signature.json"
            if ($LASTEXITCODE -ne 0) { throw "Cosign signature verification failed for $($subject.Reference)." }
            cosign verify-attestation --type spdxjson --certificate-identity $identity --certificate-oidc-issuer $issuer $subject.Reference | Out-File -Encoding utf8 "$($subject.SBOM).attestation.json"
            if ($LASTEXITCODE -ne 0) { throw "Cosign SBOM attestation verification failed for $($subject.Reference)." }
          }

      - name: Upload security reports and SBOMs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: demo-security-${{ github.sha }}
          path: .artifacts/security/
          retention-days: 30
          if-no-files-found: error
          include-hidden-files: true

      - name: Create delivery installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ vars.STEADYSTATE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.STEADYSTATE_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Checkout for GitOps delivery
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: true

      - name: Create or update GitOps pull request
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          VERSION: ${{ steps.metadata.outputs.version }}
          DIGEST: ${{ steps.registry.outputs.digest }}
          BAD_DIGEST: ${{ steps.registry.outputs.bad_digest }}
        run: |
          $manifest = 'gitops/applications/demo/application.yaml'
          $branch = "automation/demo-app-$env:VERSION"
          $title = "chore(gitops): deploy demo app $env:VERSION"
          $content = Get-Content -Raw -LiteralPath $manifest
          $tagPattern = '(?m)^    tag: v(?:0|[1-9][0-9]*)\.(?:0|[1-9][0-9]*)\.(?:0|[1-9][0-9]*)$'
          $tagMatches = [regex]::Matches($content, $tagPattern)
          if ($tagMatches.Count -ne 1) { throw "Expected exactly one demo image tag in $manifest." }
          if ($tagMatches[0].Value -eq "    tag: $env:VERSION") {
              if ($env:VERSION -eq 'v0.6.0' -and
                  ($content -notmatch '(?m)^    requireSignedImage: true$' -or $content -notmatch '(?m)^    networkIsolation: true$')) {
                  throw 'The Phase 6 image is current but its signed-image and network-isolation controls are not active.'
              }
              Write-Host "$manifest already deploys $env:VERSION; no delivery PR is required."
              exit 0
          }

          git config user.name '${{ steps.app-token.outputs.app-slug }}[bot]'
          $userId = gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id
          if ($LASTEXITCODE -ne 0 -or -not $userId) { throw 'Could not resolve the GitHub App bot identity.' }
          git config user.email "$userId+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git fetch origin main:refs/remotes/origin/main
          if ($LASTEXITCODE -ne 0) { throw 'Could not fetch main.' }

          $previousPreference = $ErrorActionPreference
          $ErrorActionPreference = 'Continue'
          git ls-remote --exit-code --heads origin $branch *> $null
          $branchExitCode = $LASTEXITCODE
          $ErrorActionPreference = $previousPreference
          if ($branchExitCode -eq 0) {
              git fetch origin "$branch`:refs/remotes/origin/$branch"
              if ($LASTEXITCODE -ne 0) { throw "Could not fetch existing branch $branch." }
              git switch --create $branch --track "origin/$branch"
          } elseif ($branchExitCode -eq 2) {
              git switch --create $branch $env:GITHUB_SHA
          } else {
              throw "Could not determine whether branch $branch exists."
          }
          if ($LASTEXITCODE -ne 0) { throw "Could not switch to delivery branch $branch." }

          $existingChanges = @(git diff --name-only origin/main...HEAD)
          $unexpected = @($existingChanges | Where-Object { $_ -ne $manifest })
          if ($unexpected.Count -gt 0) {
              throw "Delivery branch contains unexpected files: $($unexpected -join ', ')"
          }

          $content = Get-Content -Raw -LiteralPath $manifest
          $tagMatches = [regex]::Matches($content, $tagPattern)
          if ($tagMatches.Count -ne 1) { throw "Expected exactly one demo image tag in $manifest." }
          $updated = [regex]::Replace($content, $tagPattern, "    tag: $env:VERSION")
          if ($env:VERSION -eq 'v0.6.0') {
              $updated = $updated -replace '(?m)^    requireSignedImage: false$', '    requireSignedImage: true'
              $updated = $updated -replace '(?m)^    networkIsolation: false$', '    networkIsolation: true'
              if ($updated -notmatch '(?m)^    requireSignedImage: true$' -or $updated -notmatch '(?m)^    networkIsolation: true$') {
                  throw 'Phase 6 delivery did not activate signed-image verification and network isolation.'
              }
          }
          [IO.File]::WriteAllText($manifest, $updated, [Text.UTF8Encoding]::new($false))
          $worktreeChanges = @(git diff --name-only)
          $unexpected = @($worktreeChanges | Where-Object { $_ -ne $manifest })
          if ($unexpected.Count -gt 0 -or $worktreeChanges.Count -gt 1) {
              throw 'The delivery mutation must change only the demo GitOps manifest.'
          }
          if ($worktreeChanges.Count -eq 1) {
              git add -- $manifest
              git commit -m "chore(gitops): deploy demo app $env:VERSION"
              if ($LASTEXITCODE -ne 0) { throw 'Could not commit the GitOps manifest bump.' }
          }

          $deliveryChanges = @(git diff --name-only origin/main...HEAD)
          if ($deliveryChanges.Count -ne 1 -or $deliveryChanges[0] -ne $manifest) {
              throw 'The delivery branch must contain only the demo GitOps manifest change.'
          }
          git push --set-upstream origin $branch
          if ($LASTEXITCODE -ne 0) { throw 'Could not push the GitOps delivery branch.' }

          $workflowUrl = '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          $body = @"
          Automated GitOps delivery for the SteadyState demo application.

          - Source commit: $env:GITHUB_SHA
          - Semver: $env:VERSION
          - Image digest: $env:DIGEST
          - Bad-variant digest: $env:BAD_DIGEST
          - SBOM attestation: SPDX JSON, verified with Cosign
          - Security activation: signed-image verification and network isolation
          - Workflow: $workflowUrl
          - Manifest: $manifest
          "@
          $number = gh pr list --head $branch --base main --state open --json number --jq '.[0].number'
          if ($LASTEXITCODE -ne 0) { throw 'Could not query existing delivery pull requests.' }
          if ($number) {
              gh pr edit $number --title $title --body $body
          } else {
              gh pr create --base main --head $branch --title $title --body $body
          }
          if ($LASTEXITCODE -ne 0) { throw 'Could not create or update the delivery pull request.' }
