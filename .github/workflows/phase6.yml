name: Phase 6 acceptance

on:
  schedule:
    - cron: "47 4 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

concurrency:
  group: phase6-acceptance-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/saadabdullaah/steadystate-demo-app

jobs:
  acceptance:
    name: signed-admission-and-secret-custody
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SOPS_AGE_KEY: ${{ secrets.SOPS_AGE_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned platform and security tools
        timeout-minutes: 10
        shell: pwsh
        run: |
          ./scripts/install-tools.ps1 -BaseOnly -IncludeSecurity
          ./scripts/dev.ps1 check-versions
          ./scripts/dev.ps1 verify-security

      - name: Install pinned Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6
        with:
          cosign-release: v3.1.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Log in to GHCR
        uses: docker/login-action@06fb636fac595d6fb4b28a5dfcb21a6f5091859c
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build wrong-identity acceptance image
        id: wrong
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          file: apps/demo-app/Dockerfile
          platforms: linux/amd64
          push: true
          provenance: false
          sbom: false
          tags: ${{ env.IMAGE }}:acceptance-phase6-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Prepare acceptance evidence directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path .artifacts/phase6/acceptance/cosign, .artifacts/phase6/acceptance/sboms, .artifacts/phase6/acceptance/scans | Out-Null

      - name: Generate wrong-identity SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.IMAGE }}@${{ steps.wrong.outputs.digest }}
          format: spdx-json
          output-file: .artifacts/phase6/acceptance/cosign/wrong-identity.spdx.json
          artifact-name: phase6-wrong-identity.spdx.json
          syft-version: v1.48.0
          upload-artifact: false
          upload-release-assets: false

      - name: Sign and attest with intentionally wrong workflow identity
        shell: pwsh
        env:
          WRONG_DIGEST: ${{ steps.wrong.outputs.digest }}
        run: |
          $reference = "$env:IMAGE@$env:WRONG_DIGEST"
          cosign sign --yes $reference
          if ($LASTEXITCODE -ne 0) { throw 'Signing the wrong-identity fixture failed.' }
          cosign attest --yes --type spdxjson --predicate .artifacts/phase6/acceptance/cosign/wrong-identity.spdx.json $reference
          if ($LASTEXITCODE -ne 0) { throw 'Attesting the wrong-identity fixture failed.' }
          "PHASE6_WRONG_IDENTITY_IMAGE=$reference" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Verify public Phase 6 release provenance
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path .artifacts/phase6/acceptance/cosign | Out-Null
          $identity = 'https://github.com/saadabdullaah/steadystate/.github/workflows/demo-release.yml@refs/heads/main'
          $issuer = 'https://token.actions.githubusercontent.com'
          foreach ($variant in @('v0.6.0','v0.6.0-bad')) {
            $reference = "$env:IMAGE`:$variant"
            cosign verify --certificate-identity $identity --certificate-oidc-issuer $issuer $reference |
              Out-File -Encoding utf8 ".artifacts/phase6/acceptance/cosign/$variant-signature.json"
            if ($LASTEXITCODE -ne 0) { throw "Public signature verification failed for $reference." }
            cosign verify-attestation --type spdxjson --certificate-identity $identity --certificate-oidc-issuer $issuer $reference |
              Out-File -Encoding utf8 ".artifacts/phase6/acceptance/cosign/$variant-attestation.json"
            if ($LASTEXITCODE -ne 0) { throw "Public SPDX attestation verification failed for $reference." }
          }
          docker logout ghcr.io

      - name: Capture public good-image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.IMAGE }}:v0.6.0
          format: spdx-json
          output-file: .artifacts/phase6/acceptance/sboms/v0.6.0.spdx.json
          artifact-name: phase6-v0.6.0.spdx.json
          syft-version: v1.48.0
          upload-artifact: false
          upload-release-assets: false

      - name: Capture public bad-image SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          image: ${{ env.IMAGE }}:v0.6.0-bad
          format: spdx-json
          output-file: .artifacts/phase6/acceptance/sboms/v0.6.0-bad.spdx.json
          artifact-name: phase6-v0.6.0-bad.spdx.json
          syft-version: v1.48.0
          upload-artifact: false
          upload-release-assets: false

      - name: Capture public good-image vulnerability report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:v0.6.0
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: .artifacts/phase6/acceptance/scans/v0.6.0-trivy.json
          exit-code: "0"

      - name: Capture public bad-image vulnerability report
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}:v0.6.0-bad
          scanners: vuln
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: .artifacts/phase6/acceptance/scans/v0.6.0-bad-trivy.json
          exit-code: "0"

      - name: Load pinned recording versions
        shell: pwsh
        run: |
          $entries = @{}
          Get-Content scripts/versions.env | ForEach-Object { if ($_ -match '^([^#=]+)=(.+)$') { $entries[$Matches[1]]=$Matches[2] } }
          foreach ($name in @('VHS_VERSION','TTYD_VERSION','VHS_LINUX_X86_64_SHA256','TTYD_LINUX_X86_64_SHA256')) {
            if (-not $entries[$name]) { throw "$name is missing." }
            "$name=$($entries[$name])" | Out-File $env:GITHUB_ENV -Encoding utf8 -Append
          }

      - name: Install pinned recording tools
        timeout-minutes: 6
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes ffmpeg
          fi
          install_dir="$RUNNER_TEMP/steadystate-recording/bin"
          mkdir -p "$install_dir"
          archive="$RUNNER_TEMP/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz"
          curl --fail --location --retry 3 --output "$archive" "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz"
          echo "${VHS_LINUX_X86_64_SHA256}  ${archive}" | sha256sum --check --strict
          tar --extract --gzip --strip-components=1 --file "$archive" --directory "$install_dir"
          curl --fail --location --retry 3 --output "$install_dir/ttyd" "https://github.com/tsl0922/ttyd/releases/download/${TTYD_VERSION}/ttyd.x86_64"
          echo "${TTYD_LINUX_X86_64_SHA256}  ${install_dir}/ttyd" | sha256sum --check --strict
          chmod 0755 "$install_dir/vhs" "$install_dir/ttyd"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Bootstrap standard profile
        timeout-minutes: 15
        shell: pwsh
        run: ./scripts/dev.ps1 bootstrap -Profile standard

      - name: Deploy exact-revision secured GitOps platform
        timeout-minutes: 15
        shell: pwsh
        run: |
          ./scripts/dev.ps1 deploy-gitops -Profile standard -GitRevision $env:GITHUB_SHA
          ./scripts/dev.ps1 test-gitops -Profile standard

      - name: Prepare security acceptance
        id: prepare
        timeout-minutes: 4
        shell: pwsh
        run: ./scripts/phase6-acceptance.ps1 -Stage Prepare

      - name: Record admission and secret-custody proof
        id: recording
        timeout-minutes: 13
        shell: bash
        env:
          CI: ""
          COLORTERM: truecolor
        run: timeout --signal=TERM --kill-after=30s 12m vhs docs/demonstrations/phase6-admission-denial.tape

      - name: Finalize evidence
        id: finalize
        timeout-minutes: 3
        shell: pwsh
        run: ./scripts/phase6-acceptance.ps1 -Stage Finalize

      - name: Capture diagnostics
        if: always()
        continue-on-error: true
        timeout-minutes: 5
        shell: pwsh
        run: ./scripts/dev.ps1 diagnostics

      - name: Capture failure evidence
        if: always() && steps.prepare.outcome != 'skipped' && steps.finalize.outcome != 'success'
        continue-on-error: true
        timeout-minutes: 4
        shell: pwsh
        env:
          PHASE6_FAILURE_MESSAGE: prepare=${{ steps.prepare.outcome }}, recording=${{ steps.recording.outcome }}, finalize=${{ steps.finalize.outcome }}
        run: ./scripts/phase6-acceptance.ps1 -Stage CaptureFailure

      - name: Verify artifact completeness
        if: always() && steps.prepare.outcome != 'skipped'
        timeout-minutes: 2
        shell: pwsh
        run: |
          $required = @(
            'docs/demonstrations/phase6-admission-denial.tape',
            '.artifacts/phase6/acceptance/evidence.json',
            '.artifacts/phase6/acceptance/snapshots/policies.yaml',
            '.artifacts/phase6/acceptance/snapshots/policyreports.yaml',
            '.artifacts/phase6/acceptance/snapshots/workloads.yaml',
            '.artifacts/phase6/acceptance/logs/kyverno.log',
            '.artifacts/phase6/acceptance/logs/operator.log'
          )
          if (@(Get-ChildItem .artifacts/phase6/acceptance/cosign -File -ErrorAction SilentlyContinue).Count -lt 5) {
            throw 'Cosign verification and SBOM evidence are incomplete.'
          }
          if (@(Get-ChildItem .artifacts/phase6/acceptance/sboms -File -ErrorAction SilentlyContinue).Count -ne 2) {
            throw 'Signed image SBOM evidence is incomplete.'
          }
          if (@(Get-ChildItem .artifacts/phase6/acceptance/scans -File -ErrorAction SilentlyContinue).Count -ne 2) {
            throw 'Signed image vulnerability evidence is incomplete.'
          }
          if ('${{ steps.finalize.outcome }}' -eq 'success') {
            $required += '.artifacts/phase6/acceptance/phase6-admission-denial.gif'
          }
          foreach ($path in $required) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf) -or (Get-Item $path).Length -le 0) { throw "Missing or empty artifact: $path" }
          }
          if (@(Get-ChildItem .artifacts/diagnostics -Recurse -File -ErrorAction SilentlyContinue).Count -eq 0) { throw 'Cluster diagnostics are missing.' }

      - name: Upload Phase 6 acceptance artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: phase6-acceptance-${{ github.sha }}
          path: |
            docs/demonstrations/phase6-admission-denial.tape
            .artifacts/phase6/acceptance/
            .artifacts/diagnostics/
          retention-days: 30
          if-no-files-found: error
          include-hidden-files: true

      - name: Remove wrong-identity package version
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FIXTURE_TAG: acceptance-phase6-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          $versions = gh api '/users/saadabdullaah/packages/container/steadystate-demo-app/versions?per_page=100' | ConvertFrom-Json
          $version = @($versions | Where-Object { $env:FIXTURE_TAG -in @($_.metadata.container.tags) })[0]
          if ($version) {
            gh api --method DELETE "/users/saadabdullaah/packages/container/steadystate-demo-app/versions/$($version.id)"
            if ($LASTEXITCODE -ne 0) { throw 'Could not delete the wrong-identity package version.' }
          }

      - name: Undeploy GitOps
        if: always()
        continue-on-error: true
        timeout-minutes: 7
        shell: pwsh
        run: ./scripts/dev.ps1 undeploy-gitops

      - name: Destroy cluster
        if: always()
        timeout-minutes: 5
        shell: pwsh
        run: ./scripts/dev.ps1 destroy
