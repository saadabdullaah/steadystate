name: Nightly integration

on:
  schedule:
    - cron: "41 20 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  round-trip:
    name: standard-round-trip
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install pinned tools
        shell: pwsh
        run: ./scripts/install-tools.ps1 -BaseOnly
      - name: Bootstrap standard profile
        shell: pwsh
        run: ./scripts/dev.ps1 bootstrap -Profile standard
      - name: Destroy and bootstrap again
        shell: pwsh
        run: |
          ./scripts/dev.ps1 destroy
          ./scripts/dev.ps1 bootstrap -Profile standard
      - name: Build and load operator images
        shell: pwsh
        run: |
          ./scripts/dev.ps1 build-images
          ./scripts/dev.ps1 load-images
      - name: Deploy and test the Application operator
        shell: pwsh
        run: |
          ./scripts/dev.ps1 deploy-operator
          ./scripts/dev.ps1 test-operator
      - name: Load pinned recording versions
        shell: pwsh
        run: |
          $required = @(
            'VHS_VERSION',
            'TTYD_VERSION',
            'VHS_LINUX_X86_64_SHA256',
            'TTYD_LINUX_X86_64_SHA256'
          )
          $entries = @{}
          Get-Content -LiteralPath scripts/versions.env | ForEach-Object {
            if ($_ -match '^([^#=]+)=(.+)$') { $entries[$Matches[1]] = $Matches[2] }
          }
          foreach ($name in $required) {
            if (-not $entries[$name]) { throw "$name is missing from scripts/versions.env." }
            "$name=$($entries[$name])" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
      # vhs-action v2.1.0 searches for an FFmpeg 5.1 release asset that no
      # longer exists. Install the same official VHS release directly so every
      # downloaded binary remains version- and checksum-locked.
      - name: Install pinned recording tools
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends ffmpeg
          fi
          ffmpeg -version | head -n 1

          install_dir="$RUNNER_TEMP/steadystate-recording/bin"
          mkdir -p "$install_dir"

          vhs_archive="$RUNNER_TEMP/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz"
          curl --fail --location --retry 3 --output "$vhs_archive" \
            "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz"
          echo "${VHS_LINUX_X86_64_SHA256}  ${vhs_archive}" | sha256sum --check --strict
          tar --extract --gzip --strip-components=1 --file "$vhs_archive" --directory "$install_dir"

          curl --fail --location --retry 3 --output "$install_dir/ttyd" \
            "https://github.com/tsl0922/ttyd/releases/download/${TTYD_VERSION}/ttyd.x86_64"
          echo "${TTYD_LINUX_X86_64_SHA256}  ${install_dir}/ttyd" | sha256sum --check --strict
          chmod 0755 "$install_dir/vhs" "$install_dir/ttyd"

          "$install_dir/vhs" --version
          "$install_dir/ttyd" --version
          echo "$install_dir" >> "$GITHUB_PATH"
      - name: Record and run the Phase 1 self-heal acceptance test
        shell: bash
        env:
          CI: ""
          COLORTERM: truecolor
        run: vhs docs/demonstrations/phase1-self-heal.tape
      - name: Verify Phase 1 acceptance evidence
        shell: pwsh
        run: |
          $gif = Get-Item -LiteralPath docs/demonstrations/phase1-self-heal.gif
          if ($gif.Length -le 0) { throw 'The Phase 1 GIF is empty.' }
          $evidence = Get-Content -Raw -LiteralPath .artifacts/phase1/acceptance.json | ConvertFrom-Json
          if ($evidence.schemaVersion -ne 1 -or $evidence.result -ne 'passed') {
            throw 'The Phase 1 evidence document is invalid or did not pass.'
          }
          $required = @(
            'application-ready',
            'deployment-recreated',
            'service-recreated',
            'configmap-recreated',
            'httproute-recreated',
            'deployment-drift-repaired',
            'gateway-reachable',
            'application-garbage-collected'
          )
          $actual = @($evidence.checks | Where-Object status -eq 'passed' | ForEach-Object name)
          foreach ($name in $required) {
            if ($name -notin $actual) { throw "Missing passed acceptance check: $name" }
          }
          foreach ($timed in @('deployment-recreated', 'deployment-drift-repaired')) {
            $check = $evidence.checks | Where-Object name -eq $timed
            if ([double]$check.elapsedSeconds -ge 10) { throw "$timed exceeded the 10-second Phase 1 limit." }
          }
          Write-Host "Verified $($required.Count) Phase 1 acceptance checks and $($gif.Length) bytes of GIF evidence."
      - name: Capture Phase 1 acceptance diagnostics
        shell: pwsh
        run: ./scripts/dev.ps1 diagnostics
      - name: Upload Phase 1 acceptance evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: phase1-acceptance-${{ github.sha }}
          path: |
            docs/demonstrations/phase1-self-heal.gif
            .artifacts/phase1/acceptance.json
            .artifacts/diagnostics/
          retention-days: 30
          if-no-files-found: error
          include-hidden-files: true
      - name: Run Phase 2 cross-team isolation acceptance
        shell: pwsh
        run: ./scripts/dev.ps1 test-isolation -Profile standard -EvidencePath .artifacts/phase2/acceptance.json
      - name: Verify Phase 2 acceptance evidence
        shell: pwsh
        run: |
          $evidence = Get-Content -Raw -LiteralPath .artifacts/phase2/acceptance.json | ConvertFrom-Json
          if ($evidence.schemaVersion -ne 1 -or $evidence.result -ne 'passed') {
            throw 'The Phase 2 evidence document is invalid or did not pass.'
          }
          if ($evidence.sourceRevision -ne $env:GITHUB_SHA -or $evidence.profile -ne 'standard') {
            throw 'The Phase 2 evidence does not describe this standard-profile workflow revision.'
          }
          $required = @(
            'calico-enforcement-present',
            'team-boundaries-ready',
            'concurrent-applications-ready',
            'cross-team-service-denied',
            'gateway-route-succeeds',
            'cross-team-rbac-denied',
            'repository-authorization-rejected',
            'unmanaged-namespace-rejected',
            'quota-admission-rejected',
            'team-deletion-isolated'
          )
          $passed = @($evidence.checks | Where-Object status -eq 'passed')
          $actual = @($passed | ForEach-Object name)
          if (@($actual | Select-Object -Unique).Count -ne $actual.Count) {
            throw 'The Phase 2 evidence contains duplicate check names.'
          }
          foreach ($name in $required) {
            if ($name -notin $actual) { throw "Missing passed Phase 2 acceptance check: $name" }
          }
          if (@($passed | Where-Object { [double]$_.elapsedSeconds -lt 0 }).Count -gt 0) {
            throw 'The Phase 2 evidence contains a negative elapsed time.'
          }
          Write-Host "Verified $($required.Count) Phase 2 acceptance checks."
      - name: Capture Phase 2 acceptance diagnostics
        shell: pwsh
        run: ./scripts/dev.ps1 diagnostics
      - name: Upload Phase 2 acceptance evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: phase2-acceptance-${{ github.sha }}
          path: |
            .artifacts/phase2/acceptance.json
            .artifacts/phase2/rendered/
            .artifacts/diagnostics/
          retention-days: 30
          if-no-files-found: error
          include-hidden-files: true
      - name: Prepare Phase 3 acceptance branch
        shell: pwsh
        run: |
          "PHASE3_ACCEPTANCE_BRANCH=acceptance/phase3-$env:GITHUB_RUN_ID-$env:GITHUB_RUN_ATTEMPT" |
            Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Create Phase 3 acceptance installation token
        id: phase3-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1
        with:
          client-id: ${{ vars.STEADYSTATE_BOT_CLIENT_ID }}
          private-key: ${{ secrets.STEADYSTATE_BOT_PRIVATE_KEY }}
          permission-contents: write
      - name: Configure Phase 3 Git credentials
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.phase3-app-token.outputs.token }}
        run: gh auth setup-git
      - name: Record and run Phase 3 GitOps delivery acceptance
        id: phase3
        shell: bash
        env:
          CI: ""
          COLORTERM: truecolor
          GH_TOKEN: ${{ steps.phase3-app-token.outputs.token }}
          PHASE3_APP_SLUG: ${{ steps.phase3-app-token.outputs.app-slug }}
        run: vhs docs/demonstrations/phase3-gitops-delivery.tape
      - name: Verify Phase 3 acceptance evidence
        shell: pwsh
        run: |
          $gif = Get-Item -LiteralPath docs/demonstrations/phase3-gitops-delivery.gif
          if ($gif.Length -le 0) { throw 'The Phase 3 GIF is empty.' }
          $evidence = Get-Content -Raw -LiteralPath .artifacts/phase3/acceptance.json | ConvertFrom-Json
          if ($evidence.schemaVersion -ne 1 -or $evidence.result -ne 'passed' -or $evidence.failure) {
            throw 'The Phase 3 evidence document is invalid or did not pass.'
          }
          if ($evidence.sourceSHA -ne $env:GITHUB_SHA -or $evidence.profile -ne 'standard' -or
              $evidence.ephemeralBranch -ne $env:PHASE3_ACCEPTANCE_BRANCH) {
            throw 'The Phase 3 evidence does not describe this workflow revision and branch.'
          }
          foreach ($field in @('baselineCommit','candidateCommit','rejectionCommit','recoveryCommit')) {
            if ([string]$evidence.$field -notmatch '^([0-9a-f]{40}|[0-9a-f]{64})$') {
              throw "Phase 3 evidence has an invalid $field."
            }
          }
          if ($evidence.resolvedGitRevision -ne $evidence.recoveryCommit) {
            throw 'The final resolved Git revision does not match the recovery commit.'
          }
          if ([string]$evidence.runtimeDigest -notmatch '^sha256:[0-9a-f]{64}$' -or
              $evidence.runtimeDigest -ne $evidence.registry.runtimeDigest -or
              -not $evidence.registry.anonymousPull -or $evidence.registry.platform -ne 'linux/amd64') {
            throw 'The runtime and anonymous GHCR digest evidence is invalid.'
          }
          $required = @(
            'pinned-argocd-installed-dex-absent',
            'argocd-ui-route-reachable',
            'root-platform-team-applications-healthy',
            'baseline-version-reachable',
            'git-commit-detected-without-kubectl-delivery-mutation',
            'candidate-synchronized-and-served',
            'runtime-digest-matches-ghcr-linux-amd64',
            'resolved-git-revision-matches-candidate',
            'kubernetes-and-argo-degraded-on-rejection',
            'recovery-restores-healthy',
            'argo-health-matches-kubernetes-status',
            'operator-outage-preserves-resource-uids',
            'operator-restart-reconciles-without-drift',
            'argo-ownership-boundary'
          )
          $passed = @($evidence.checks | Where-Object status -eq 'passed')
          $names = @($passed | ForEach-Object name)
          if (@($names | Select-Object -Unique).Count -ne $names.Count) {
            throw 'The Phase 3 evidence contains duplicate check names.'
          }
          foreach ($name in $required) {
            if ($name -notin $names) { throw "Missing passed Phase 3 check: $name" }
          }
          if (@($passed | Where-Object { [double]$_.elapsedSeconds -lt 0 }).Count -gt 0) {
            throw 'The Phase 3 evidence contains a negative elapsed time.'
          }
          Write-Host "Verified $($required.Count) Phase 3 checks and $($gif.Length) bytes of GIF evidence."
      - name: Capture Phase 3 acceptance diagnostics
        if: always() && steps.phase3.outcome != 'skipped'
        shell: pwsh
        run: ./scripts/dev.ps1 diagnostics
      - name: Verify Phase 3 artifact completeness
        if: always() && steps.phase3.outcome != 'skipped'
        shell: pwsh
        run: |
          $requiredFiles = @(
            '.artifacts/phase3/acceptance.json',
            '.artifacts/phase3/registry.json',
            '.artifacts/phase3/rendered/baseline.yaml',
            '.artifacts/phase3/rendered/candidate.yaml',
            '.artifacts/phase3/rendered/rejection.yaml',
            '.artifacts/phase3/rendered/recovery.yaml',
            '.artifacts/phase3/rendered/root.yaml',
            '.artifacts/phase3/snapshots/argocd-applications.json',
            '.artifacts/phase3/snapshots/application.json',
            '.artifacts/phase3/snapshots/team.json',
            '.artifacts/phase3/logs/operator.log',
            '.artifacts/phase3/logs/argocd-application-controller.log',
            '.artifacts/phase3/logs/argocd-repo-server.log'
          )
          foreach ($path in $requiredFiles) {
            if (-not (Test-Path -LiteralPath $path -PathType Leaf) -or
                (Get-Item -LiteralPath $path).Length -le 0) {
              throw "Missing or empty Phase 3 artifact file: $path"
            }
          }
          $diagnostics = @(Get-ChildItem -LiteralPath .artifacts/diagnostics -Recurse -File -ErrorAction SilentlyContinue)
          if ($diagnostics.Count -eq 0) { throw 'Phase 3 cluster diagnostics are missing.' }
      - name: Upload Phase 3 acceptance evidence
        if: always() && steps.phase3.outcome != 'skipped'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: phase3-acceptance-${{ github.sha }}
          path: |
            docs/demonstrations/phase3-gitops-delivery.gif
            .artifacts/phase3/
            .artifacts/diagnostics/
          retention-days: 30
          if-no-files-found: error
          include-hidden-files: true
      - name: Capture diagnostics
        if: failure()
        shell: pwsh
        run: ./scripts/dev.ps1 diagnostics
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: standard-round-trip-diagnostics
          path: |
            .artifacts/gitops/
            .artifacts/phase2/
            .artifacts/phase3/
            .artifacts/diagnostics/
          retention-days: 7
          include-hidden-files: true
      - name: Delete Phase 3 acceptance branch
        if: always()
        shell: pwsh
        env:
          GH_TOKEN: ${{ steps.phase3-app-token.outputs.token }}
        run: |
          if (-not $env:GH_TOKEN -or -not $env:PHASE3_ACCEPTANCE_BRANCH) {
            Write-Host 'No Phase 3 acceptance branch credentials were created.'
            exit 0
          }
          gh auth setup-git
          $heads = @(git ls-remote --heads origin $env:PHASE3_ACCEPTANCE_BRANCH)
          if ($LASTEXITCODE -ne 0) { throw 'Could not inspect the Phase 3 acceptance branch.' }
          if ($heads.Count -gt 0) {
            git push origin --delete $env:PHASE3_ACCEPTANCE_BRANCH
            if ($LASTEXITCODE -ne 0) { throw 'Could not delete the Phase 3 acceptance branch.' }
          } else {
            Write-Host 'The Phase 3 acceptance branch is already absent.'
          }
      - name: Undeploy GitOps foundation
        if: always()
        continue-on-error: true
        shell: pwsh
        run: ./scripts/dev.ps1 undeploy-gitops
      - name: Undeploy the Application operator
        if: always()
        shell: pwsh
        run: |
          ./scripts/dev.ps1 undeploy-operator
      - name: Destroy cluster
        if: always()
        shell: pwsh
        run: ./scripts/dev.ps1 destroy
