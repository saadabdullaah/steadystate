name: Nightly integration

on:
  schedule:
    - cron: "41 20 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  round-trip:
    name: standard-round-trip
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install pinned tools
        shell: pwsh
        run: ./scripts/install-tools.ps1 -BaseOnly
      - name: Bootstrap standard profile
        shell: pwsh
        run: ./scripts/dev.ps1 bootstrap -Profile standard
      - name: Destroy and bootstrap again
        shell: pwsh
        run: |
          ./scripts/dev.ps1 destroy
          ./scripts/dev.ps1 bootstrap -Profile standard
      - name: Build and load operator images
        shell: pwsh
        run: |
          ./scripts/dev.ps1 build-images
          ./scripts/dev.ps1 load-images
      - name: Deploy and test the Application operator
        shell: pwsh
        run: |
          ./scripts/dev.ps1 deploy-operator
          ./scripts/dev.ps1 test-operator
      - name: Load pinned recording versions
        shell: pwsh
        run: |
          $required = @(
            'VHS_VERSION',
            'TTYD_VERSION',
            'VHS_LINUX_X86_64_SHA256',
            'TTYD_LINUX_X86_64_SHA256'
          )
          $entries = @{}
          Get-Content -LiteralPath scripts/versions.env | ForEach-Object {
            if ($_ -match '^([^#=]+)=(.+)$') { $entries[$Matches[1]] = $Matches[2] }
          }
          foreach ($name in $required) {
            if (-not $entries[$name]) { throw "$name is missing from scripts/versions.env." }
            "$name=$($entries[$name])" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          }
      # vhs-action v2.1.0 searches for an FFmpeg 5.1 release asset that no
      # longer exists. Install the same official VHS release directly so every
      # downloaded binary remains version- and checksum-locked.
      - name: Install pinned recording tools
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v ffmpeg >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install --yes --no-install-recommends ffmpeg
          fi
          ffmpeg -version | head -n 1

          install_dir="$RUNNER_TEMP/steadystate-recording/bin"
          mkdir -p "$install_dir"

          vhs_archive="$RUNNER_TEMP/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz"
          curl --fail --location --retry 3 --output "$vhs_archive" \
            "https://github.com/charmbracelet/vhs/releases/download/v${VHS_VERSION}/vhs_${VHS_VERSION}_Linux_x86_64.tar.gz"
          echo "${VHS_LINUX_X86_64_SHA256}  ${vhs_archive}" | sha256sum --check --strict
          tar --extract --gzip --strip-components=1 --file "$vhs_archive" --directory "$install_dir"

          curl --fail --location --retry 3 --output "$install_dir/ttyd" \
            "https://github.com/tsl0922/ttyd/releases/download/${TTYD_VERSION}/ttyd.x86_64"
          echo "${TTYD_LINUX_X86_64_SHA256}  ${install_dir}/ttyd" | sha256sum --check --strict
          chmod 0755 "$install_dir/vhs" "$install_dir/ttyd"

          "$install_dir/vhs" --version
          "$install_dir/ttyd" --version
          echo "$install_dir" >> "$GITHUB_PATH"
      - name: Record and run the Phase 1 self-heal acceptance test
        shell: bash
        env:
          CI: ""
          COLORTERM: truecolor
        run: vhs docs/demonstrations/phase1-self-heal.tape
      - name: Verify Phase 1 acceptance evidence
        shell: pwsh
        run: |
          $gif = Get-Item -LiteralPath docs/demonstrations/phase1-self-heal.gif
          if ($gif.Length -le 0) { throw 'The Phase 1 GIF is empty.' }
          $evidence = Get-Content -Raw -LiteralPath .artifacts/phase1/acceptance.json | ConvertFrom-Json
          if ($evidence.schemaVersion -ne 1 -or $evidence.result -ne 'passed') {
            throw 'The Phase 1 evidence document is invalid or did not pass.'
          }
          $required = @(
            'application-ready',
            'deployment-recreated',
            'service-recreated',
            'configmap-recreated',
            'httproute-recreated',
            'deployment-drift-repaired',
            'gateway-reachable',
            'application-garbage-collected'
          )
          $actual = @($evidence.checks | Where-Object status -eq 'passed' | ForEach-Object name)
          foreach ($name in $required) {
            if ($name -notin $actual) { throw "Missing passed acceptance check: $name" }
          }
          foreach ($timed in @('deployment-recreated', 'deployment-drift-repaired')) {
            $check = $evidence.checks | Where-Object name -eq $timed
            if ([double]$check.elapsedSeconds -ge 10) { throw "$timed exceeded the 10-second Phase 1 limit." }
          }
          Write-Host "Verified $($required.Count) Phase 1 acceptance checks and $($gif.Length) bytes of GIF evidence."
      - name: Capture Phase 1 acceptance diagnostics
        shell: pwsh
        run: ./scripts/dev.ps1 diagnostics
      - name: Upload Phase 1 acceptance evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: phase1-acceptance-${{ github.sha }}
          path: |
            docs/demonstrations/phase1-self-heal.gif
            .artifacts/phase1/acceptance.json
            .artifacts/diagnostics/
          retention-days: 30
          if-no-files-found: error
          include-hidden-files: true
      - name: Run Phase 2 cross-team isolation acceptance
        shell: pwsh
        run: ./scripts/dev.ps1 test-isolation -Profile standard -EvidencePath .artifacts/phase2/acceptance.json
      - name: Verify Phase 2 acceptance evidence
        shell: pwsh
        run: |
          $evidence = Get-Content -Raw -LiteralPath .artifacts/phase2/acceptance.json | ConvertFrom-Json
          if ($evidence.schemaVersion -ne 1 -or $evidence.result -ne 'passed') {
            throw 'The Phase 2 evidence document is invalid or did not pass.'
          }
          if ($evidence.sourceRevision -ne $env:GITHUB_SHA -or $evidence.profile -ne 'standard') {
            throw 'The Phase 2 evidence does not describe this standard-profile workflow revision.'
          }
          $required = @(
            'calico-enforcement-present',
            'team-boundaries-ready',
            'concurrent-applications-ready',
            'cross-team-service-denied',
            'gateway-route-succeeds',
            'cross-team-rbac-denied',
            'repository-authorization-rejected',
            'unmanaged-namespace-rejected',
            'quota-admission-rejected',
            'team-deletion-isolated'
          )
          $passed = @($evidence.checks | Where-Object status -eq 'passed')
          $actual = @($passed | ForEach-Object name)
          if (@($actual | Select-Object -Unique).Count -ne $actual.Count) {
            throw 'The Phase 2 evidence contains duplicate check names.'
          }
          foreach ($name in $required) {
            if ($name -notin $actual) { throw "Missing passed Phase 2 acceptance check: $name" }
          }
          if (@($passed | Where-Object { [double]$_.elapsedSeconds -lt 0 }).Count -gt 0) {
            throw 'The Phase 2 evidence contains a negative elapsed time.'
          }
          Write-Host "Verified $($required.Count) Phase 2 acceptance checks."
      - name: Capture Phase 2 acceptance diagnostics
        shell: pwsh
        run: ./scripts/dev.ps1 diagnostics
      - name: Upload Phase 2 acceptance evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: phase2-acceptance-${{ github.sha }}
          path: |
            .artifacts/phase2/acceptance.json
            .artifacts/phase2/rendered/
            .artifacts/diagnostics/
          retention-days: 30
          if-no-files-found: error
          include-hidden-files: true
      - name: Deploy Argo CD and GitOps root
        shell: pwsh
        run: ./scripts/dev.ps1 deploy-gitops -Profile standard -GitRevision $env:GITHUB_SHA
      - name: Run Phase 3 GitOps foundation baseline
        shell: pwsh
        run: ./scripts/dev.ps1 test-gitops -Profile standard -GitRevision $env:GITHUB_SHA -EvidencePath .artifacts/gitops/baseline.json
      - name: Verify GitOps foundation evidence
        shell: pwsh
        run: |
          $evidence = Get-Content -Raw -LiteralPath .artifacts/gitops/baseline.json | ConvertFrom-Json
          if ($evidence.schemaVersion -ne 1 -or $evidence.result -ne 'passed') {
            throw 'The GitOps baseline evidence is invalid or did not pass.'
          }
          if ($evidence.profile -ne 'standard' -or $evidence.resolvedGitRevision -ne $env:GITHUB_SHA) {
            throw 'The GitOps baseline evidence does not match this standard-profile commit.'
          }
          if ($evidence.argoCDVersion -ne '3.4.2') {
            throw 'The GitOps baseline used an unexpected Argo CD version.'
          }
          $required = @(
            'pinned-argocd-ready-dex-absent',
            'argocd-application-argocd-configuration-healthy',
            'argocd-application-steadystate-operator-healthy',
            'argocd-application-payments-healthy',
            'argocd-application-steadystate-root-healthy',
            'gitops-team-and-application-ready',
            'argocd-ui-gateway-reachable',
            'runtime-provenance-matches-root-revision',
            'annotation-resource-tracking'
          )
          $passed = @($evidence.checks | Where-Object status -eq 'passed' | ForEach-Object name)
          if (@($passed | Select-Object -Unique).Count -ne $passed.Count) {
            throw 'The GitOps baseline contains duplicate check names.'
          }
          foreach ($name in $required) {
            if ($name -notin $passed) { throw "Missing passed GitOps baseline check: $name" }
          }
      - name: Capture GitOps foundation diagnostics
        shell: pwsh
        run: ./scripts/dev.ps1 diagnostics
      - name: Upload GitOps foundation evidence
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: phase3-gitops-foundation-${{ github.sha }}
          path: |
            .artifacts/gitops/baseline.json
            .artifacts/gitops/bootstrap-projects.yaml
            .artifacts/gitops/bootstrap-root-application.yaml
            .artifacts/diagnostics/
          retention-days: 30
          if-no-files-found: error
          include-hidden-files: true
      - name: Capture diagnostics
        if: failure()
        shell: pwsh
        run: ./scripts/dev.ps1 diagnostics
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: standard-round-trip-diagnostics
          path: |
            .artifacts/gitops/
            .artifacts/phase2/
            .artifacts/diagnostics/
          retention-days: 7
          include-hidden-files: true
      - name: Undeploy GitOps foundation
        if: always()
        continue-on-error: true
        shell: pwsh
        run: ./scripts/dev.ps1 undeploy-gitops
      - name: Undeploy the Application operator
        if: always()
        shell: pwsh
        run: |
          ./scripts/dev.ps1 undeploy-operator
      - name: Destroy cluster
        if: always()
        shell: pwsh
        run: ./scripts/dev.ps1 destroy
