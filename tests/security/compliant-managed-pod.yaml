apiVersion: v1
kind: Pod
metadata:
  name: compliant-managed
  namespace: team-payments
  labels:
    app.kubernetes.io/managed-by: steadystate
    steadystate.dev/workload-kind: application
    steadystate.dev/require-signed-image: "false"
    steadystate.dev/network-isolation: "true"
spec:
  automountServiceAccountToken: false
  containers:
    - name: application
      image: ghcr.io/saadabdullaah/steadystate-demo-app:v0.6.0
      resources:
        requests:
          cpu: 50m
          memory: 32Mi
        limits:
          cpu: 200m
          memory: 128Mi
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        readOnlyRootFilesystem: true
        runAsNonRoot: true
