apiVersion: v1
kind: Pod
metadata:
  name: quota-violation
  namespace: team-orders
  annotations:
    checkov.io/skip1: >-
      CKV2_K8S_6=The Team controller creates and continuously reconciles the
      namespace-wide default-deny and explicit allow NetworkPolicies.
    checkov.io/skip2: >-
      CKV_K8S_14=The runtime renderer replaces the placeholder with the
      SHA-256-pinned ISOLATION_CLIENT_IMAGE from scripts/versions.env.
    checkov.io/skip3: >-
      CKV_K8S_43=The runtime renderer replaces the placeholder with the
      SHA-256-pinned ISOLATION_CLIENT_IMAGE from scripts/versions.env.
spec:
  automountServiceAccountToken: false
  restartPolicy: Never
  securityContext:
    runAsGroup: 65532
    runAsNonRoot: true
    runAsUser: 65532
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: workload
      image: __ISOLATION_CLIENT_IMAGE__
      command: ["sleep", "60"]
      readinessProbe:
        exec:
          command: ["sh", "-c", "true"]
      livenessProbe:
        exec:
          command: ["sh", "-c", "true"]
      resources:
        requests: {cpu: "2", memory: 2Gi}
        limits: {cpu: "2", memory: 2Gi}
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        readOnlyRootFilesystem: true
        runAsUser: 65532
