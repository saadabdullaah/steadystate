apiVersion: platform.steadystate.dev/v1alpha1
kind: Application
metadata:
  name: forbidden-payments-image
  namespace: team-orders
spec:
  owner: orders-owner
  image:
    repository: ghcr.io/saadabdullaah/payments-private
    tag: __DEMO_TAG__
  runtime:
    port: 8080
    replicas:
      min: 1
      max: 1
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  deployment:
    strategy: rolling
    automaticRollback: true
  reliability:
    availabilityTarget: "99.9%"
    maximumP95Latency: 250ms
    maximumErrorRate: "1%"
  observability:
    metrics: false
    logs: false
    traces: false
  security:
    requireSignedImage: false
    runAsNonRoot: true
    networkIsolation: false
