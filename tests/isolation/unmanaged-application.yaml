apiVersion: v1
kind: Namespace
metadata:
  name: steadystate-unmanaged
---
apiVersion: platform.steadystate.dev/v1alpha1
kind: Application
metadata:
  name: unmanaged-api
  namespace: steadystate-unmanaged
spec:
  owner: unmanaged-owner
  image:
    repository: __DEMO_REPOSITORY__
    tag: __DEMO_TAG__
  runtime:
    port: 8080
    replicas:
      min: 1
      max: 1
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  deployment:
    strategy: rolling
    automaticRollback: true
  reliability:
    availabilityTarget: "99.9%"
    maximumP95Latency: 250ms
    maximumErrorRate: "1%"
  observability:
    metrics: false
    logs: false
    traces: false
  security:
    requireSignedImage: false
    runAsNonRoot: true
    networkIsolation: false
