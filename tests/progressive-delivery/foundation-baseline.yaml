apiVersion: v1
kind: Namespace
metadata:
  name: steadystate-rollouts-proof
  labels:
    steadystate.dev/gateway-access: "true"
---
apiVersion: v1
kind: Service
metadata:
  name: foundation-stable
  namespace: steadystate-rollouts-proof
spec:
  selector:
    app.kubernetes.io/name: phase4-foundation
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: v1
kind: Service
metadata:
  name: foundation-canary
  namespace: steadystate-rollouts-proof
spec:
  selector:
    app.kubernetes.io/name: phase4-foundation
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: foundation
  namespace: steadystate-rollouts-proof
spec:
  parentRefs:
    - name: steadystate
      namespace: steadystate-system
  hostnames:
    - phase4-foundation.steadystate.localtest.me
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: foundation-stable
          port: 80
        - name: foundation-canary
          port: 80
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: foundation
  namespace: steadystate-rollouts-proof
spec:
  replicas: 2
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: phase4-foundation
  strategy:
    canary:
      stableService: foundation-stable
      canaryService: foundation-canary
      trafficRouting:
        plugins:
          argoproj-labs/gatewayAPI:
            httpRoute: foundation
            namespace: steadystate-rollouts-proof
      steps:
        - setWeight: 10
        - pause: {}
        - setWeight: 50
        - pause: {}
        - setWeight: 100
  template:
    metadata:
      labels:
        app.kubernetes.io/name: phase4-foundation
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: application
          image: ghcr.io/saadabdullaah/steadystate-demo-app:v0.3.0
          imagePullPolicy: IfNotPresent
          env:
            - name: STEADYSTATE_APP_NAME
              value: phase4-foundation
            - name: STEADYSTATE_APP_NAMESPACE
              value: steadystate-rollouts-proof
            - name: STEADYSTATE_APP_VERSION
              value: stable
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
