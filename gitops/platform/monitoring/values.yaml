defaultRules:
  create: false

alertmanager:
  enabled: true
  config:
    route:
      receiver: "null"
    receivers:
      - name: "null"
  alertmanagerSpec:
    replicas: 1
    retention: 6h
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

grafana:
  enabled: true
  defaultDatasourceEnabled: false
  defaultDashboardsEnabled: false
  env:
    GF_SECURITY_DISABLE_INITIAL_ADMIN_CREATION: "true"
  grafana.ini:
    auth:
      disable_login_form: true
    auth.anonymous:
      enabled: true
      org_role: Viewer
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 320Mi
  sidecar:
    dashboards:
      enabled: true
      label: grafana_dashboard
      searchNamespace: monitoring
    resources:
      requests:
        cpu: 10m
        memory: 24Mi
    limits:
      cpu: 50m
      memory: 64Mi
  additionalDataSources:
    - name: Prometheus
      uid: prometheus
      type: prometheus
      access: proxy
      url: http://monitoring-kube-prometheus-prometheus:9090
      isDefault: true
      jsonData:
        timeInterval: 15s
    - name: Loki
      uid: loki
      type: loki
      access: proxy
      url: http://loki:3100
      jsonData:
        derivedFields:
          - name: TraceID
            matcherRegex: '"trace_id":"([a-f0-9]+)"'
            datasourceUid: tempo
            url: '$${__value.raw}'
    - name: Tempo
      uid: tempo
      type: tempo
      access: proxy
      url: http://tempo:3200
      jsonData:
        tracesToLogsV2:
          datasourceUid: loki
          spanStartTimeShift: -5m
          spanEndTimeShift: 5m
          filterByTraceID: true
          filterBySpanID: false
          customQuery: true
          query: '{trace_id="$${__trace.traceId}"}'

kubeApiServer:
  enabled: false
kubelet:
  enabled: true
kubeControllerManager:
  enabled: false
coreDns:
  enabled: false
kubeDns:
  enabled: false
kubeEtcd:
  enabled: false
kubeScheduler:
  enabled: false
kubeProxy:
  enabled: false
kubeStateMetrics:
  enabled: true
nodeExporter:
  enabled: false
prometheus-node-exporter:
  enabled: false

kube-state-metrics:
  collectors:
    - pods
  metricLabelsAllowlist:
    - pods=[app.kubernetes.io/instance,app.kubernetes.io/managed-by,rollouts-pod-template-hash,steadystate.dev/version]
  resources:
    requests:
      cpu: 25m
      memory: 48Mi
    limits:
      cpu: 100m
      memory: 80Mi

prometheusOperator:
  tls:
    enabled: false
  admissionWebhooks:
    enabled: false
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 160Mi

prometheus:
  enabled: true
  prometheusSpec:
    replicas: 1
    retention: 6h
    scrapeInterval: 15s
    evaluationInterval: 15s
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorNamespaceSelector: {}
    ruleSelectorNilUsesHelmValues: false
    ruleNamespaceSelector: {}
    resources:
      requests:
        cpu: 100m
        memory: 192Mi
      limits:
        cpu: 500m
        memory: 448Mi
