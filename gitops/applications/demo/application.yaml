apiVersion: platform.steadystate.dev/v1alpha1
kind: Application
metadata:
  name: demo
  namespace: team-payments
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  owner: platform-team
  image:
    repository: ghcr.io/saadabdullaah/steadystate-demo-app
    tag: v0.4.0
  runtime:
    port: 8080
    replicas:
      min: 1
      max: 3
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  deployment:
    strategy: canary
    steps:
      - weight: 10
        pause: 30s
      - weight: 25
        pause: 30s
      - weight: 50
        pause: 30s
      - weight: 100
        pause: 30s
    automaticRollback: true
  reliability:
    availabilityTarget: "99.9%"
    maximumP95Latency: 250ms
    maximumErrorRate: "1%"
  observability:
    metrics: true
    logs: true
    traces: true
  security:
    requireSignedImage: false
    runAsNonRoot: true
    networkIsolation: false
